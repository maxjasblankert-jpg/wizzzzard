# Render Blueprint — deploy bot service for Champion ML bots
# Dashboard: New > Blueprint > connect GitHub repo > apply this file
services:
  - type: web
    name: wizzzzard-bots
    runtime: docker
    rootDir: neural-bot
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    plan: free
    envVars:
      - key: PORT
        value: "8001"
